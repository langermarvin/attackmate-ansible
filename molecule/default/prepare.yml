---
- name: Install essential prerequisites (like sudo)
  hosts: all
  become: no       # We are connecting as root (ansible_user: root in molecule.yml)
  gather_facts: no # Avoid fact gathering before sudo is installed
  vars:
    # Define a list of essential packages if you have more than just sudo
    # For now, just sudo. This assumes all your images are Debian-based.
    essential_packages_debian:
      - sudo
  tasks:
    - name: Preliminary apt update via raw command
      ansible.builtin.raw: apt-get update -y 
      changed_when: false # It's hard to get reliable change status from raw 'apt-get update'
                          # For prepare.yml, often acceptable to not track its change precisely.

    - name: Install python3 via raw command (to enable Ansible modules)
      ansible.builtin.raw: apt-get install -y python3 python3-packaging
      changed_when: true

    # This block assumes all your test images (kali, ubuntu*) are Debian-based.
    # If you have mixed OS families, you'd need more complex logic or separate
    # prepare files, but for now, this should cover your listed instances.

    - name: Update apt cache (pre-package install)
      ansible.builtin.apt:
        update_cache: yes
      # No 'when' condition based on ansible_os_family here, as facts are not gathered yet.

    - name: Install essential packages (including sudo) for Debian-family
      ansible.builtin.apt:
        name: "{{ essential_packages_debian }}" # installs sudo
        state: present

- name: Prepare Instance
  hosts: all
  become: yes # Run tasks as root
  gather_facts: yes # Usually not needed for prep
  tasks:
    # Debian/Ubuntu based systems (Kali, Ubuntu)
    - name: Update apt cache
      ansible.builtin.apt:
        update_cache: yes
        cache_valid_time: 3600 # Avoid updating too often during tests
      when: ansible_os_family == 'Debian'
      changed_when: false # Don't report cache update as change